<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TimeFlow"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>TimeFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--bg2:#13131a;--bg3:#1c1c27;--bg4:#242433;--bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);--tx:#f0f0f5;--tx2:#8888a0;--tx3:#55556a;--ac:#7c6af7;--ac2:#5c4fd6;--gn:#34d399;--rd:#f87171;--am:#fbbf24;--fn:'Sora',sans-serif;--mo:'DM Mono',monospace;--r:16px;--rs:10px;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
html{font-size:16px}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding-top:var(--sat);padding-bottom:calc(var(--sab) + 16px)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mo);font-size:12px;font-weight:500;color:#fff;letter-spacing:.5px}
.app-ttl{font-size:15px;font-weight:600;letter-spacing:-.2px}
.wk-lbl{font-size:11px;color:var(--tx2);margin-top:1px}
.clk{font-family:var(--mo);font-size:18px;font-weight:500;color:var(--tx2);letter-spacing:1px;transition:color .3s}
.clk.run{color:var(--gn)}
.sbar{margin:0 16px 8px;background:var(--bg2);border:.5px solid var(--bdr2);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sinfo{display:flex;align-items:center;gap:8px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--tx3);transition:background .3s;flex-shrink:0}
.sdot.run{background:var(--gn);animation:pulse 1.8s infinite}
.sdot.pau{background:var(--am)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.sst{font-size:13px;color:var(--tx2)}
.sacts{display:flex;gap:8px}
.btn-go{padding:8px 20px;border-radius:8px;border:none;background:var(--ac);color:#fff;font-family:var(--fn);font-size:13px;font-weight:600;cursor:pointer;min-width:70px;transition:all .15s}
.btn-go:active{transform:scale(.96)}
.btn-go.stop{background:var(--bg3);color:var(--rd);border:.5px solid rgba(248,113,113,.3)}
.btn-rst{padding:8px 14px;border-radius:8px;border:.5px solid var(--bdr2);background:transparent;color:var(--tx3);font-family:var(--fn);font-size:13px;cursor:pointer}
.btn-rst:active{transform:scale(.96);background:var(--bg3)}
.nav{display:flex;margin:4px 16px 12px;background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--rs);padding:3px;gap:2px}
.ntab{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--tx2);font-family:var(--fn);font-size:12px;font-weight:500;cursor:pointer;border-radius:8px;transition:all .2s}
.ntab.act{background:var(--bg4);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tab{display:none;flex:1;overflow-y:auto;padding:0 16px}
.tab.act{display:block}
.cur-card{background:var(--bg2);border:.5px solid var(--bdr2);border-radius:var(--r);padding:20px;margin-bottom:14px;text-align:center;transition:border-color .3s;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.cur-card.on{border-color:rgba(124,106,247,.4)}
.cur-lbl{font-size:12px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.cur-tmr{font-family:var(--mo);font-size:36px;font-weight:500;letter-spacing:1px;margin:4px 0}
.cur-hint{font-size:12px;color:var(--tx3)}
.cur-nm{font-size:16px;font-weight:600;margin-top:2px}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.atile{background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--r);padding:16px 14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;min-height:88px;display:flex;flex-direction:column;justify-content:space-between;user-select:none;-webkit-user-select:none}
.atile:active{transform:scale(.97)}
.atile.on{border-width:1.5px}
.tbar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.tnm{font-size:13px;font-weight:500;color:var(--tx);line-height:1.3}
.ttm{font-family:var(--mo);font-size:13px;color:var(--tx2);margin-top:8px}
.tlive{display:flex;align-items:center;gap:5px;margin-top:2px}
.tldot{width:6px;height:6px;border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}
.tllbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.sh{padding:4px 0 12px;display:flex;align-items:baseline;justify-content:space-between}
.wkh{margin-top:24px;border-top:.5px solid var(--bdr);padding-top:20px;display:flex;align-items:baseline;justify-content:space-between}
.stl{font-size:13px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em}
.stot{font-size:13px;color:var(--ac);font-weight:500}
.si{background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--rs);padding:14px 16px;margin-bottom:8px}
.si-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.si-nm{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
.si-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.si-tm{font-family:var(--mo);font-size:14px;font-weight:500}
.pb{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .4s}
.si-ft{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.si-tg{font-size:11px;color:var(--tx3)}
.si-dl{font-size:12px;font-weight:600}
.over{color:var(--rd)}.under{color:var(--gn)}.neut{color:var(--tx3)}
.empty{text-align:center;padding:40px 20px;color:var(--tx3);font-size:14px;line-height:1.6}
.hday{margin-bottom:20px}
.hday-l{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.hsp{background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hsl{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.hsdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hsnm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hstl{font-size:11px;color:var(--tx3);margin-top:1px}
.hsdur{font-family:var(--mo);font-size:13px;color:var(--tx2);flex-shrink:0}
.sec-ttl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;padding-top:4px}
.setit{background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--rs);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.setdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.setinfo{flex:1;min-width:0}
.setnm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.setmt{font-size:11px;color:var(--tx3);margin-top:2px}
.setit.off .setnm{opacity:.45}
.btn-ed{padding:6px 14px;border-radius:7px;border:.5px solid var(--bdr2);background:var(--bg3);color:var(--tx2);font-family:var(--fn);font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0}
.btn-ed:active{transform:scale(.95)}
.addform{background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--r);padding:18px 16px;margin-top:16px;margin-bottom:16px}
.addform-ttl{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--tx2)}
.ti{width:100%;background:var(--bg3);border:.5px solid var(--bdr2);border-radius:10px;padding:12px 14px;color:var(--tx);font-family:var(--fn);font-size:14px;margin-bottom:10px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.ti:focus{border-color:var(--ac)}
.ti::placeholder{color:var(--tx3)}
.irow{display:flex;gap:10px;margin-bottom:10px}
.igrp{flex:1}
.ilbl{display:block;font-size:11px;color:var(--tx3);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.cpick{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0}
.csw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.csw.sel{border-color:#fff;transform:scale(1.15)}
.btn-add{width:100%;padding:14px;border-radius:10px;border:none;background:var(--ac);color:#fff;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-add:active{transform:scale(.98);background:var(--ac2)}
.tog{position:relative;display:inline-block;width:44px;height:26px}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:var(--bg4);border-radius:13px;border:.5px solid var(--bdr2);transition:.2s;cursor:pointer}
.tog-sl::before{content:'';position:absolute;width:20px;height:20px;left:2px;top:2px;background:var(--tx2);border-radius:50%;transition:.2s}
.tog input:checked+.tog-sl{background:var(--ac);border-color:var(--ac)}
.tog input:checked+.tog-sl::before{transform:translateX(18px);background:#fff}
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.mov.open{display:flex}
.modal{background:var(--bg2);border:.5px solid var(--bdr2);border-radius:24px 24px 0 0;padding:24px 20px;padding-bottom:calc(24px + var(--sab));width:100%;max-width:480px}
.mttl{font-size:17px;font-weight:600;margin-bottom:18px}
.mtr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:8px}
.macts{display:flex;gap:10px;margin-top:12px}
.btn-mc{flex:1;padding:13px;border-radius:10px;border:.5px solid var(--bdr2);background:var(--bg3);color:var(--tx2);font-family:var(--fn);font-size:14px;font-weight:500;cursor:pointer}
.btn-ms{flex:2;padding:13px;border-radius:10px;border:none;background:var(--ac);color:#fff;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer}
.btn-mc:active,.btn-ms:active{transform:scale(.97)}
.btn-del{width:100%;padding:13px;border-radius:10px;border:.5px solid rgba(248,113,113,.25);background:rgba(248,113,113,.08);color:var(--rd);font-family:var(--fn);font-size:14px;font-weight:500;cursor:pointer;margin-top:10px}
.btn-del:active{transform:scale(.97)}
.cmsg{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:4px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-l">
      <div class="logo">TF</div>
      <div><div class="app-ttl">TimeFlow</div><div class="wk-lbl" id="wk-lbl">Week —</div></div>
    </div>
    <div class="clk" id="clk">00:00:00</div>
  </div>
  <div class="sbar">
    <div class="sinfo"><span class="sdot" id="sdot"></span><span class="sst" id="sst">Ready to start</span></div>
    <div class="sacts">
      <button class="btn-go" id="btn-go">Start</button>
      <button class="btn-rst" id="btn-rst">Reset</button>
    </div>
  </div>
  <nav class="nav">
    <button class="ntab act" data-tab="tracker">Track</button>
    <button class="ntab" data-tab="summary">Summary</button>
    <button class="ntab" data-tab="history">History</button>
    <button class="ntab" data-tab="settings">Activities</button>
  </nav>
  <div class="tab act" id="tab-tracker">
    <div class="cur-card" id="cur-card">
      <div class="cur-lbl">No activity selected</div>
      <div class="cur-tmr" id="cur-tmr" style="color:var(--tx3)">—</div>
      <div class="cur-hint">Select an activity below to begin</div>
    </div>
    <div class="agrid" id="agrid"></div>
  </div>
  <div class="tab" id="tab-summary">
    <div class="sh"><div class="stl">Today</div><div class="stot" id="sum-tot">0m tracked</div></div>
    <div id="sum-list"></div>
    <div class="wkh"><div class="stl">This week</div></div>
    <div id="wk-list"></div>
  </div>
  <div class="tab" id="tab-history">
    <div style="padding:4px 0 12px"><div class="stl">Session log</div></div>
    <div id="hist-list"></div>
  </div>
  <div class="tab" id="tab-settings">
    <div class="sec-ttl">Your activities</div>
    <div id="set-list"></div>
    <div class="addform">
      <div class="addform-ttl">Add new activity</div>
      <input class="ti" id="new-name" placeholder="Activity name"/>
      <div class="irow">
        <div class="igrp">
          <label class="ilbl">Weekly target (hrs)</label>
          <input class="ti" id="new-tgt" type="number" min="0" max="40" placeholder="0" style="margin-bottom:0"/>
        </div>
        <div class="igrp">
          <label class="ilbl">Colour</label>
          <div class="cpick" id="cpick-new"></div>
        </div>
      </div>
      <button class="btn-add" id="btn-add-act">Add activity</button>
    </div>
  </div>
</div>

<div class="mov" id="edit-modal">
  <div class="modal">
    <div class="mttl">Edit activity</div>
    <input class="ti" id="edit-name" placeholder="Activity name"/>
    <div class="irow">
      <div class="igrp">
        <label class="ilbl">Weekly target (hrs)</label>
        <input class="ti" id="edit-tgt" type="number" min="0" max="40" style="margin-bottom:0"/>
      </div>
      <div class="igrp">
        <label class="ilbl">Colour</label>
        <div class="cpick" id="cpick-edit"></div>
      </div>
    </div>
    <div class="mtr">
      <span class="ilbl" style="margin-bottom:0">Show in tracker</span>
      <label class="tog"><input type="checkbox" id="edit-active"/><span class="tog-sl"></span></label>
    </div>
    <div class="macts">
      <button class="btn-mc" id="btn-ec">Cancel</button>
      <button class="btn-ms" id="btn-es">Save</button>
    </div>
    <button class="btn-del" id="btn-ed">Delete activity</button>
  </div>
</div>

<div class="mov" id="conf-modal">
  <div class="modal">
    <div class="mttl" id="conf-ttl">Confirm</div>
    <div class="cmsg" id="conf-msg"></div>
    <div class="macts">
      <button class="btn-mc" id="btn-cc">Cancel</button>
      <button class="btn-ms" id="btn-co">Confirm</button>
    </div>
  </div>
</div>

<script>
var COLORS=['#7c6af7','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#a78bfa','#2dd4bf','#fb923c','#a3e635'];
var S={activities:[],sessions:[],cs:{running:false,startTs:null,elapsed:0,splits:[],actId:null,splitStart:null},nextId:1,newColor:COLORS[0],editColor:COLORS[0],editingId:null};
